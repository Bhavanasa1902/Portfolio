<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>USA — California Highlight</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #fdf6e3;
    }
    #chartdiv {
      width: 100%;
      height: 100%;
    }
  </style>
  <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/geodata/usaLow.js"></script>
</head>
<body>
  <div id="chartdiv"></div>
  <script>
    am5.ready(function () {
      var root = am5.Root.new("chartdiv");

      // Disable amCharts logo
      root._logo.dispose();

      var chart = root.container.children.push(
        am5map.MapChart.new(root, {
          projection: am5map.geoAlbersUsa(),
          panX: "none",
          panY: "none",
          wheelY: "none"
        })
      );

      // -------------------------------------------------------
      // US STATES
      // -------------------------------------------------------
      var polygonSeries = chart.series.push(
        am5map.MapPolygonSeries.new(root, {
          geoJSON: am5geodata_usaLow
        })
      );

      // Default state styling
      polygonSeries.mapPolygons.template.setAll({
        fill: am5.color(0xeee8d5),       // solarized base2
        stroke: am5.color(0xfdf6e3),     // cream borders
        strokeWidth: 1.5,
        interactive: false
      });

      // Highlight California
      polygonSeries.mapPolygons.template.adapters.add("fill", function (fill, target) {
        if (target.dataItem && target.dataItem.get("id") === "US-CA") {
          return am5.color(0x073642);    // solarized base03
        }
        return fill;
      });

      // -------------------------------------------------------
      // FULLERTON PIN
      // -------------------------------------------------------
      var pointSeries = chart.series.push(
        am5map.MapPointSeries.new(root, {
          zIndex: 100
        })
      );

      pointSeries.bullets.push(function (root, series, dataItem) {
        var name = (dataItem.dataContext && dataItem.dataContext.name) || "";

        var container = am5.Container.new(root, {
          zIndex: 100
        });

        // Pin stem
        container.children.push(am5.Graphics.new(root, {
          stroke: am5.color(0xdc322f),
          strokeWidth: 2.5,
          draw: function (display) {
            display.moveTo(0, 0);
            display.lineTo(0, -20);
          }
        }));

        // Pin head
        container.children.push(am5.Circle.new(root, {
          radius: 7,
          fill: am5.color(0xdc322f),
          stroke: am5.color(0xfdf6e3),
          strokeWidth: 2,
          centerY: 27
        }));

        // Label with background
        if (name) {
          container.children.push(am5.Label.new(root, {
            text: name,
            fill: am5.color(0x073642),
            fontSize: 14,
            fontWeight: "700",
            fontFamily: "system-ui, sans-serif",
            centerY: am5.p50,
            centerX: am5.p50,
            dy: -42,
            paddingTop: 5,
            paddingBottom: 5,
            paddingLeft: 10,
            paddingRight: 10,
            background: am5.RoundedRectangle.new(root, {
              fill: am5.color(0xfdf6e3),
              fillOpacity: 0.92,
              stroke: am5.color(0x93a1a1),
              strokeWidth: 1,
              strokeOpacity: 0.4,
              cornerRadiusTL: 4,
              cornerRadiusTR: 4,
              cornerRadiusBL: 4,
              cornerRadiusBR: 4,
              shadowColor: am5.color(0x000000),
              shadowBlur: 6,
              shadowOpacity: 0.12,
              shadowOffsetY: 2
            })
          }));
        }

        return am5.Bullet.new(root, {
          sprite: container
        });
      });

      // Fullerton, CA
      pointSeries.data.push({
        latitude: 33.8704,
        longitude: -117.9242,
        name: "Fullerton, CA"
      });
    });
  </script>
</body>
</html>
